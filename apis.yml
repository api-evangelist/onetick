  - url: llms/onetick-py-llms.txt
    type: LLMsTxt
  - url: https://docs.pip.distribution.sol.onetick.com/static/changelog.html
    type: ChangeLog
  description: A pandas-like Python API for querying tick-by-tick market data in OneTick,
    published on PyPI as onetick-py with openly browsable documentation. Against OneTick
    Cloud it executes over the WebAPI transport (OTP_HTTP_ADDRESS=https://rest.cloud.onetick.com)
    using the same OAuth2 client credentials, returning results as pandas DataFrames.
