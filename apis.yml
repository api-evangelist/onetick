aid: onetick
url: https://raw.githubusercontent.com/api-evangelist/onetick/refs/heads/main/apis.yml
name: OneTick (OneMarketData)
kind: company
description: OneTick, from OneMarketData, is an enterprise tick database and analytics
  platform for capital markets, capturing, storing, and analyzing trade, quote, and
  order-book time series at scale for quant research, transaction cost analysis, and
  trade surveillance. OneTick Cloud sells historical and reference market data covering
  200+ global equities, options, and futures venues (history back to 1993, corporate
  actions, symbol cross-reference) delivered on demand through an OAuth2-secured REST
  WebAPI, a pandas-like Python API (onetick-py), a directed-graph Python API, SQL
  querying, and file delivery, with a self-serve trial registration. The detailed
  REST endpoint reference sits behind the cloud dashboard login. OneMarketData merged
  with KX in September 2025 under TA Associates ownership.
