apis:
- aid: onetick:onetick-cloud-rest-api
  name: OneTick Cloud REST API (WebAPI)
  tags:
  - REST
  - Market Data
  - Tick Data
  - Historical Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.onetick.com/cloud-services/rest-api-end-point-documentation
  baseURL: https://rest.cloud.onetick.com/omdwebapi/rest/
  properties:
  - url: https://www.onetick.com/cloud-services/rest-api-end-point-documentation
    type: Documentation
  - url: https://blog.onetick.com/basic-setup-of-webapi-access-to-onetick-cloud
    type: Documentation
  description: HTTPS REST access to OneTick Cloud market data and analytics queries,
    authenticated with an OAuth2 client-credentials Bearer token issued by the OneTick
    Keycloak realm (https://cloud-auth.parent.onetick.com/realms/OMD/protocol/openid-connect/token).
    A REST URL builder and per-endpoint reference (parameters and output schemas)
    are provided behind the cloud dashboard login; the public page describes the API
    but does not enumerate endpoints.
- aid: onetick:onetick-py-python-api
  name: OneTick Python API - onetick-py (pandas-style)
  tags:
  - Python
  - Pandas
  - Market Data
  - Analytics
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.pip.distribution.sol.onetick.com/
