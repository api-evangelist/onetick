    type: Documentation
  description: Cloud API for extracting adjusted and unadjusted point-in-time quotes
    and trades at nanosecond precision across 200+ venues for transaction cost analysis,
    packaged for Python integration; marketed sales-led (request a demo) with no public
    endpoint reference.
